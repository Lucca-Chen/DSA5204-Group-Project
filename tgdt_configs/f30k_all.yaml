dataset:
  name: 'f30k'
  images-path: '/scratch/e1553870/TGDT_data/f30k/images'
  data: '/scratch/e1553870/TGDT_data'
  restval: True
  pre-extracted-features: False

text-model:
  name: 'bert'
  pretrain: 'bert-base-uncased'
  word-dim: 768
  extraction-hidden-layer: 6
  fine-tune: True
  pre-extracted: False
  layers: 0
  dropout: 0.1

image-model:
  name: 'bottomup'
  pre-extracted-features-root: '/scratch/e1553870/TGDT_data/f30k/features_36'
  transformer-layers: 4
  dropout: 0.1
  pos-encoding: 'concat-and-process'
  crop-size: 224
  fine-tune: False
  feat-dim: 2048
  norm: True

model:
  name: 'baseline'
  embed-size: 1024
  text-aggregation: 'first'
  image-aggregation: 'first'
  layers: 2
  exclude-stopwords: False
  shared-transformer: False
  dropout: 0.1

training:
  lr: 0.00001
  grad-clip: 2.0
  max-violation: True
  loss-type: 'alignment+matching'
  matching-weight: 1
  alignment-weight: 1
  alignment-mode: 'MrSw'
  measure: 'dot'
  margin: 0.2
  bs: 30
  scheduler: 'steplr'
  gamma: 0.1
  step-size: 20
  warmup: 'linear'
  warmup-period: 1000
